<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>Expense Tracker</h1>
        <p>Track spending effortlessly with responsive design, animated interactions, and MySQL-powered storage.</p>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>Add new expense</h2>
        <form id="expense-form">
          <div class="form-group">
            <label for="description">Description</label>
            <input id="description" name="description" type="text" placeholder="Coffee, groceries, rent" required />
          </div>
          <div class="form-group">
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" step="0.01" min="0.01" placeholder="35.00" required />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="Food">Food</option>
              <option value="Utilities">Utilities</option>
              <option value="Shopping">Shopping</option>
              <option value="Transport">Transport</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required />
          </div>
          <button type="submit" class="primary-btn">Add expense</button>
        </form>
      </section>

      <section class="card">
        <h2>Summary</h2>
        <div class="summary">
          <div class="stat">
            <div>
              <strong id="summary-total">$0.00</strong>
              <span>Total spent</span>
            </div>
            <div id="summary-count">0 transactions</div>
          </div>
          <div class="stat">
            <div>
              <strong id="summary-food">$0.00</strong>
              <span>Food</span>
            </div>
          </div>
          <div class="stat">
            <div>
              <strong id="summary-utilities">$0.00</strong>
              <span>Utilities</span>
            </div>
          </div>
          <div class="stat">
            <div>
              <strong id="summary-shopping">$0.00</strong>
              <span>Shopping</span>
            </div>
          </div>
          <div class="stat">
            <div>
              <strong id="summary-transport">$0.00</strong>
              <span>Transport</span>
            </div>
          </div>
          <div class="stat">
            <div>
              <strong id="summary-other">$0.00</strong>
              <span>Other</span>
            </div>
          </div>
        </div>
      </section>
    </div>

    <section class="card">
      <h2>Expense history</h2>
      <div id="expense-list" class="expense-list"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
